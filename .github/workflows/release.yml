name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ── Agente Go: binários multiplataforma ────────────────────────────────
  agent:
    name: Agente Go (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          BASE="vaultdb-agent_${VER}_${GOOS}_${GOARCH}"
          mkdir -p dist
          (cd agent && go build -ldflags "-s -w -X main.Version=${VER}" -o "../dist/vaultdb-agent${EXT}" .)
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "${BASE}.zip" "vaultdb-agent${EXT}" && rm "vaultdb-agent${EXT}"
          else
            tar -czf "${BASE}.tar.gz" "vaultdb-agent${EXT}" && rm "vaultdb-agent${EXT}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # ── App desktop: Linux (binário standalone) ────────────────────────────
  desktop-linux:
    name: Desktop Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/requirements-desktop.txt

      - name: PyInstaller
        run: pyinstaller --clean --noconfirm packaging/vaultdb.spec

      - name: Empacotar (tar.gz portátil)
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          mkdir -p out
          chmod +x dist/VaultDB
          tar -czf "out/VaultDB_${VER}_linux_x64.tar.gz" -C dist VaultDB

      - name: AppImage
        continue-on-error: true
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          APPDIR="VaultDB.AppDir"
          mkdir -p "$APPDIR/usr/bin"
          cp dist/VaultDB "$APPDIR/usr/bin/VaultDB"
          cp packaging/appimage/AppRun "$APPDIR/AppRun" && chmod +x "$APPDIR/AppRun"
          cp packaging/appimage/VaultDB.desktop "$APPDIR/VaultDB.desktop"
          cp packaging/appimage/vaultdb.svg "$APPDIR/vaultdb.svg"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          mkdir -p out
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$APPDIR" "out/VaultDB-${VER}-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: out/*

  # ── App desktop: Windows .exe + instalador ─────────────────────────────
  desktop-windows:
    name: Desktop Windows (.exe + Setup)
    runs-on: windows-latest
    env:
      WIN_PFX: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WIN_PFX_PASS: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/requirements-desktop.txt

      - name: PyInstaller
        run: pyinstaller --clean --noconfirm packaging/vaultdb.spec

      - name: Assinar executável (opcional, se secret configurado)
        if: ${{ env.WIN_PFX != '' }}
        continue-on-error: true
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WIN_PFX))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Select-Object -Last 1
          if (-not $st) { $st = "signtool" } else { $st = $st.FullName }
          & $st sign /f "$env:RUNNER_TEMP\cert.pfx" /p $env:WIN_PFX_PASS /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist\VaultDB.exe

      - name: Empacotar (zip portátil)
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path dist/VaultDB.exe -DestinationPath "out/VaultDB_${ver}_windows_x64.zip" -Force

      - name: Instalador MSI (WiX)
        continue-on-error: true
        shell: pwsh
        run: |
          $raw = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF_NAME } else { 'v0.0.0' }
          $ver = $raw -replace '^v',''
          dotnet tool install --global wix | Out-Null
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix build packaging\windows_installer.wxs -d Version=$ver -o "out\VaultDB-$ver-x64.msi"

      - name: Assinar MSI (opcional, se secret configurado)
        if: ${{ env.WIN_PFX != '' }}
        continue-on-error: true
        shell: pwsh
        run: |
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Select-Object -Last 1
          if (-not $st) { $st = "signtool" } else { $st = $st.FullName }
          Get-ChildItem out\*.msi | ForEach-Object { & $st sign /f "$env:RUNNER_TEMP\cert.pfx" /p $env:WIN_PFX_PASS /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: out/*

  # ── App desktop: macOS (arm64 + x64) ───────────────────────────────────
  desktop-macos:
    name: Desktop macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, arch: arm64 }
          - { runner: macos-13, arch: x64 }
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/requirements-desktop.txt

      - name: PyInstaller
        run: pyinstaller --clean --noconfirm packaging/vaultdb.spec

      - name: Assinar .app (opcional, se secret configurado)
        if: ${{ env.MACOS_CERT_P12 != '' }}
        continue-on-error: true
        run: |
          KEYCHAIN="$RUNNER_TEMP/vaultdb.keychain-db"
          KPW="$(openssl rand -hex 16)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KEYCHAIN"
          codesign --deep --force --options runtime --timestamp --sign "$MACOS_SIGN_IDENTITY" dist/VaultDB.app

      - name: Criar DMG
        continue-on-error: true
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          mkdir -p out
          SRC="dist/VaultDB.app"; [ -d "$SRC" ] || SRC="dist/VaultDB"
          hdiutil create -volname "VaultDB" -srcfolder "$SRC" -ov -format UDZO "out/VaultDB_${VER}_macos_${{ matrix.arch }}.dmg"

      - name: Notarizar DMG (opcional, se secret configurado)
        if: ${{ env.APPLE_ID != '' }}
        continue-on-error: true
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          DMG="out/VaultDB_${VER}_macos_${{ matrix.arch }}.dmg"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$DMG" || true

      - name: Empacotar (tar.gz portátil)
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          mkdir -p out
          chmod +x dist/VaultDB
          tar -czf "out/VaultDB_${VER}_macos_${{ matrix.arch }}.tar.gz" -C dist VaultDB

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.arch }}
          path: out/*

  # ── Publicar na GitHub Release (apenas em tags) ────────────────────────
  release:
    name: Publicar Release
    needs: [agent, desktop-linux, desktop-windows, desktop-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
